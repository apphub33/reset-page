<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu; margin: 40px; }
    form { display: grid; gap: 12px; max-width: 360px; }
    .input-wrap { position: relative; display: grid; }
    input, button { padding: 10px; font-size: 16px; }
    .toggle {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: 0; cursor: pointer; font-size: 13px; opacity: 0.75;
    }
    .hint { font-size: 13px; opacity: 0.8; }
    .error { color: #b00020; }
    .ok { color: #0a7a0a; }
    #msg { margin-top: 10px; min-height: 1.25em; }
    [hidden] { display: none !important; }
    button[disabled] { opacity: 0.6; cursor: not-allowed; }
    .muted { font-size: 13px; opacity: 0.8; }
  </style>
</head>
<body>
  <h1>Set a new password</h1>

  <!-- MAIN RESET FORM (only shows if token/session ok) -->
  <form id="form" hidden>
    <label class="input-wrap">
      <input id="pw" type="password" placeholder="New password" required autocomplete="new-password" />
      <button type="button" class="toggle" data-target="pw" aria-label="Show password">Show</button>
    </label>

    <label class="input-wrap">
      <input id="pw2" type="password" placeholder="Confirm new password" required autocomplete="new-password" />
      <button type="button" class="toggle" data-target="pw2" aria-label="Show password">Show</button>
    </label>

    <div id="matchHint" class="hint" aria-live="polite"></div>
    <button id="submitBtn" type="submit" disabled>Update password</button>
  </form>

  <!-- FALLBACK: RESEND RESET EMAIL (shows when link invalid/expired) -->
  <form id="resend" hidden>
    <p class="muted">Invalid or expired reset link. Request a new one:</p>
    <input id="email" type="email" placeholder="Your email" required autocomplete="email" />
    <button type="submit">Send reset email</button>
    <p class="muted">We’ll send a new link that comes back to this page.</p>
  </form>

  <p id="msg" aria-live="polite"></p>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // 🔁 Put your real values here
    const SUPABASE_URL = "https://kfytmcrkbgqrzuibruwf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmeXRtY3JrYmdxcnp1aWJydXdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyMzA4NjMsImV4cCI6MjA3MTgwNjg2M30.xYV2PSqZCb0prBV8dDqc7UsrU2POpQu4EicLaW1UN5w";

    // Where to send the user after success
    const SIGN_IN_URL = "/"; // e.g. "/" or full URL to your sign-in page
    // Where Supabase should send users back during reset
    const RESET_REDIRECT = "https://apphub33.github.io/reset-page/"; // must be whitelisted in Supabase

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { flowType: 'implicit' }
    });

    const form = document.getElementById('form');
    const resend = document.getElementById('resend');
    const msg  = document.getElementById('msg');
    const pw1  = document.getElementById('pw');
    const pw2  = document.getElementById('pw2');
    const matchHint = document.getElementById('matchHint');
    const submitBtn = document.getElementById('submitBtn');

    function setMatchState() {
      const a = pw1.value.trim(), b = pw2.value.trim();
      if (!a && !b) { matchHint.textContent = ''; submitBtn.disabled = true; return; }
      if (a === b) { matchHint.textContent = 'Passwords match.'; matchHint.className = 'hint ok'; submitBtn.disabled = a.length === 0; }
      else { matchHint.textContent = 'Passwords do not match.'; matchHint.className = 'hint error'; submitBtn.disabled = true; }
    }

    function toggleVisibility(inputEl, btnEl) {
      const isPw = inputEl.type === 'password';
      inputEl.type = isPw ? 'text' : 'password';
      btnEl.textContent = isPw ? 'Hide' : 'Show';
      btnEl.setAttribute('aria-label', isPw ? 'Hide password' : 'Show password');
    }

    document.addEventListener('click', (e) => {
      const t = e.target;
      if (t.classList.contains('toggle')) {
        const input = document.getElementById(t.getAttribute('data-target'));
        if (input) toggleVisibility(input, t);
      }
    });

    pw1.addEventListener('input', setMatchState);
    pw2.addEventListener('input', setMatchState);

    function showErrorAndResend(message) {
      form.hidden = true;
      resend.hidden = false;
      msg.textContent = message || '';
    }

    async function ensureSession() {
      const url  = new URL(window.location.href);
      const search = url.searchParams;                      // token_hash flow
      const hash   = new URLSearchParams(url.hash.slice(1)); // legacy hash flow

      // If Supabase returned an error via hash, surface it.
      const errDesc = hash.get('error_description');
      if (errDesc) throw new Error(decodeURIComponent(errDesc));

      const type = search.get('type');
      const tokenHash = search.get('token_hash');

      // Newer flow: verify token_hash for 'recovery'
      if (type === 'recovery' && tokenHash) {
        const { error } = await supabase.auth.verifyOtp({ type: 'recovery', token_hash: tokenHash });
        if (error) throw error;
        return; // session ready
      }

      // Legacy flow: access_token + type=recovery in hash (supabase-js picks it up)
      if (hash.get('type') === 'recovery' && hash.get('access_token')) return;

      // No valid tokens → invalid/expired or opened directly
      throw new Error('Invalid or expired reset link. Please request a new reset email.');
    }

    (async () => {
      try {
        await ensureSession();
        form.hidden = false;     // show main form
        resend.hidden = true;
        msg.textContent = '';
        setMatchState();
      } catch (e) {
        showErrorAndResend(e.message);
      }
    })();

    // Submit new password
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const a = pw1.value.trim(), b = pw2.value.trim();
      if (a !== b) { matchHint.textContent = 'Passwords do not match.'; matchHint.className = 'hint error'; return; }

      submitBtn.disabled = true;
      msg.textContent = 'Updating password…';

      const { error } = await supabase.auth.updateUser({ password: a });
      if (error) { msg.textContent = error.message; submitBtn.disabled = false; return; }

      msg.textContent = 'Password updated — returning to sign-in…';
      setTimeout(() => location.replace(SIGN_IN_URL), 900);
    });

    // Resend reset email
    resend.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) return;
      msg.textContent = 'Sending reset email…';
      const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: RESET_REDIRECT });
      if (error) { msg.textContent = error.message; return; }
      msg.textContent = 'Email sent. Check your inbox for the new link.';
    });
  </script>
</body>
</html>
