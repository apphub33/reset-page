<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>
  <style>
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu; margin: 40px; }
    form { display: grid; gap: 12px; max-width: 360px; }
    input, button { padding: 10px; font-size: 16px; }
    #msg { margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Set a new password</h1>
  <form id="form">
    <input id="pw" type="password" placeholder="New password" required />
    <button type="submit">Update password</button>
  </form>
  <p id="msg"></p>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    // CHANGE THESE TWO LINES in Step A3:
    const SUPABASE_URL = "https://kfytmcrkbgqrzuibruwf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmeXRtY3JrYmdxcnp1aWJydXdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyMzA4NjMsImV4cCI6MjA3MTgwNjg2M30.xYV2PSqZCb0prBV8dDqc7UsrU2POpQu4EicLaW1UN5w";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function ensureSessionFromUrl() {
      const url = new URL(window.location.href);
      const code = url.searchParams.get('code'); // one link style
      const hash = new URLSearchParams(window.location.hash.slice(1)); // other link style
      const isRecovery = hash.get('type') === 'recovery';
      const accessToken = hash.get('access_token');

      if (code) {
        const { error } = await supabase.auth.exchangeCodeForSession(code);
        if (error) throw error;
      } else if (isRecovery && accessToken) {
        // already authenticated via token; no exchange needed
      } else {
        throw new Error('Invalid or expired link. Request a new reset email.');
      }
    }

    (async () => {
      try { await ensureSessionFromUrl(); }
      catch (e) {
        document.getElementById('msg').textContent = e.message;
        document.getElementById('form').style.display = 'none';
      }
    })();

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('pw').value.trim();
      const { error } = await supabase.auth.updateUser({ password: pw });
      document.getElementById('msg').textContent = error ? error.message : 'Password updated — you can sign in now.';
      if (!error) setTimeout(() => location.replace('/'), 800);
    });
  </script>
</body>
</html>
